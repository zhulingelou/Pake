<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网服务选择</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f7; user-select: none; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 380px; text-align: center; }
        h3 { margin-top: 0; color: #333; margin-bottom: 20px; font-size: 20px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 12px 0; background-color: #0071e3; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; font-weight: 500; text-align: center; font-family: monospace; }
        .btn:hover { background-color: #0077ed; }
        .btn-secondary { background-color: #34c759; }
        .btn-secondary:hover { background-color: #30b651; }
        .input-group { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .input-label { font-size: 13px; color: #666; margin-bottom: 8px; text-align: left; display: block; font-weight: 500; }
        input { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px; font-size: 14px; text-align: center; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h3>局域网服务选择</h3>
    
    <!-- 3个完整的默认网址按钮 -->
    <button class="btn" onclick="openTarget('http://192.168.18.145:2333')">http://192.168.18.145:2333</button>
    <button class="btn" onclick="openTarget('http://192.168.18.209:2333')">http://192.168.18.209:2333</button>
    <button class="btn" onclick="openTarget('http://192.168.18.210:2333')">http://192.168.18.210:2333</button>
    
    <!-- 自定义网址输入与记忆 -->
    <div class="input-group">
        <label class="input-label">自定义其它网址：</label>
        <input type="text" id="customUrl" placeholder="http://192.168.18.X:2333">
        <button class="btn btn-secondary" onclick="openCustom()">进入自定义网址</button>
    </div>
</div>

<script>
    // 页面加载时自动恢复记忆的自定义网址
    window.onload = function() {
        const savedUrl = localStorage.getItem('pake_saved_custom_url');
        document.getElementById('customUrl').value = savedUrl ? savedUrl : "http://192.168.18.";
    }

    // 核心安全打开逻辑：无缝覆盖当前视口，强制在软件窗口内部渲染，绝不弹窗
    function openTarget(url) {
        if (!url) return;
        
        // 抹除末尾可能不小心多打的斜杠，保持标准格式
        let targetUrl = url.trim();
        if (targetUrl.endsWith('/')) {
            targetUrl = targetUrl.slice(0, -1);
        }
        
        // 执行当前窗口安全导航
        window.location.replace(targetUrl);
    }

    // 处理自定义网址
    function openCustom() {
        let url = document.getElementById('customUrl').value.trim();
        if (!url) return;
        
        // 自动补全协议头
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'http://' + url;
        }
        
        // 保留输入记忆功能
        localStorage.setItem('pake_saved_custom_url', url);
        
        // 触发打开
        openTarget(url);
    }
</script>

</body>
</html>
