<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>请选择服务器</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f7;
        user-select: none;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 320px;
        text-align: center;
      }
      h3 {
        margin-top: 0;
        color: #333;
        margin-bottom: 20px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        background-color: #0071e3;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
        box-sizing: border-box;
        font-weight: 500;
      }
      .btn:hover {
        background-color: #0077ed;
      }
      .btn-secondary {
        background-color: #34c759;
      }
      .btn-secondary:hover {
        background-color: #30b651;
      }
      .input-group {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        margin-bottom: 10px;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>局域网服务选择</h3>

      <!-- 优化：移除复杂的原生多开，使用最稳妥的跳转机制 -->
      <button class="btn" onclick="openUrl('http://192.168.18')">
        服务器 209
      </button>
      <button class="btn" onclick="openUrl('http://192.168.18')">
        服务器 210
      </button>

      <div class="input-group">
        <input
          type="text"
          id="customUrl"
          placeholder="http://192.168.18.X:2333/"
        />
        <button class="btn btn-secondary" onclick="openCustom()">
          进入自定义网址
        </button>
      </div>
    </div>

    <script>
      // 页面加载时：自动读取并恢复上次记忆的自定义网址
      window.onload = function () {
        const savedUrl = localStorage.getItem("pake_saved_custom_url");
        document.getElementById("customUrl").value = savedUrl
          ? savedUrl
          : "http://192.168.18.";
      };

      // 核心跳转逻辑
      function openUrl(url) {
        if (!url) return;

        try {
          // 尝试利用标准的新建窗口方式（部分 Pake 环境支持多开新标签/新窗）
          window.open(url, "_blank");
        } catch (e) {
          // 如果多开被环境拦截，则直接在当前窗口无缝替换，确保百分百能打开
          window.location.href = url;
        }
      }

      // 自定义网址提交逻辑
      function openCustom() {
        let url = document.getElementById("customUrl").value.trim();
        if (!url) return;

        // 自动补全协议头
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          url = "http://" + url;
        }

        // 【保留记忆功能】：存入本地缓存
        localStorage.setItem("pake_saved_custom_url", url);

        // 触发打开
        openUrl(url);
      }
    </script>
  </body>
</html>
