<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>局域网服务选择</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f7;
        overflow: hidden;
      }

      /* 导航选择界面样式 */
      .nav-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
        background-color: #f5f5f7;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 340px;
        text-align: center;
      }
      h3 {
        margin-top: 0;
        color: #333;
        margin-bottom: 20px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        background-color: #0071e3;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
        font-weight: 500;
      }
      .btn:hover {
        background-color: #0077ed;
      }
      .btn-secondary {
        background-color: #34c759;
      }
      .btn-secondary:hover {
        background-color: #30b651;
      }
      .input-group {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        margin-bottom: 10px;
        font-size: 14px;
        text-align: center;
      }

      /* 网页内嵌容器样式 */
      #webFrame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* 悬浮返回按钮：方便随时切回来重新选IP */
      .back-floating-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
        padding: 10px 16px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        display: none;
        backdrop-filter: blur(4px);
        transition: background 0.2s;
      }
      .back-floating-btn:hover {
        background: rgba(0, 0, 0, 0.9);
      }
    </style>
  </head>
  <body>
    <!-- 1. 初始选择主界面 -->
    <div class="nav-wrapper" id="navWrapper">
      <div class="container">
        <h3>局域网服务选择</h3>
        <button class="btn" onclick="loadInApp('http://192.168.18')">
          服务器 209
        </button>
        <button class="btn" onclick="loadInApp('http://192.168.18')">
          服务器 210
        </button>

        <div class="input-group">
          <input
            type="text"
            id="customUrl"
            placeholder="http://192.168.18.X:2333/"
          />
          <button class="btn btn-secondary" onclick="loadCustom()">
            进入自定义网址
          </button>
        </div>
      </div>
    </div>

    <!-- 2. 用于内嵌局域网网页的独立视图，不给Tauri弹窗拦截的机会 -->
    <iframe id="webFrame" src=""></iframe>

    <!-- 3. 悬浮切换按钮 -->
    <button class="back-floating-btn" id="backBtn" onclick="goBackToNav()">
      切换服务器 ↩
    </button>

    <script>
      // 恢复记忆的自定义网址
      window.onload = function () {
        const savedUrl = localStorage.getItem("pake_saved_custom_url");
        document.getElementById("customUrl").value = savedUrl
          ? savedUrl
          : "http://192.168.18.";
      };

      // 核心加载逻辑：通过内嵌 iframe 锁定在应用内打开
      function loadInApp(url) {
        if (!url) return;

        const frame = document.getElementById("webFrame");
        const nav = document.getElementById("navWrapper");
        const backBtn = document.getElementById("backBtn");

        // 渲染内部网页
        frame.src = url;
        frame.style.display = "block";

        // 隐藏选择菜单，显示悬浮返回按钮
        nav.style.display = "none";
        backBtn.style.display = "block";
      }

      // 处理自定义网址输入
      function loadCustom() {
        let url = document.getElementById("customUrl").value.trim();
        if (!url) return;

        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          url = "http://" + url;
        }

        // 保留记忆
        localStorage.setItem("pake_saved_custom_url", url);

        // 加载
        loadInApp(url);
      }

      // 返回到选择主界面
      function goBackToNav() {
        const frame = document.getElementById("webFrame");
        const nav = document.getElementById("navWrapper");
        const backBtn = document.getElementById("backBtn");

        frame.src = "";
        frame.style.display = "none";
        nav.style.display = "flex";
        backBtn.style.display = "none";
      }
    </script>
  </body>
</html>
