<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>请选择服务器</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f7;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 320px;
        text-align: center;
      }
      h3 {
        margin-top: 0;
        color: #333;
        margin-bottom: 20px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        background-color: #0071e3;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
        text-decoration: none;
        box-sizing: border-box;
      }
      .btn:hover {
        background-color: #0077ed;
      }
      .btn-secondary {
        background-color: #34c759;
      }
      .btn-secondary:hover {
        background-color: #30b651;
      }
      .input-group {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        margin-bottom: 10px;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>局域网服务选择</h3>

      <!-- 你的常用固定网址按钮 -->
      <button class="btn" onclick="goTo('http://192.168.18')">
        服务器 209
      </button>
      <button class="btn" onclick="goTo('http://192.168.18')">
        服务器 210
      </button>

      <!-- 手动输入任意网址的输入框 -->
      <div class="input-group">
        <input
          type="text"
          id="customUrl"
          placeholder="http://192.168.18.X:2333/"
          value="http://192.168.18."
        />
        <button class="btn btn-secondary" onclick="goToCustom()">
          进入自定义网址
        </button>
      </div>
    </div>

    <script>
      // 自动加载上次成功访问的网址（可选优化）
      window.onload = function () {
        const lastUrl = localStorage.getItem("last_visited_url");
        if (lastUrl) {
          document.getElementById("customUrl").value = lastUrl;
        }
      };

      function goTo(url) {
        localStorage.setItem("last_visited_url", url);
        window.location.href = url;
      }

      function goToCustom() {
        let url = document.getElementById("customUrl").value.trim();
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          url = "http://" + url;
        }
        goTo(url);
      }
    </script>
  </body>
</html>
